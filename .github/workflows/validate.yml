name: Validate Setup Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate declarations and shell syntax
        shell: bash
        run: |
          bash -n setup.sh uninstall.sh
          ./setup.sh --help
          ./uninstall.sh --help
          if grep -Eq '^brew "(rust|node|fd)"' Brewfile; then
            echo "Brewfile contains a removed dependency." >&2
            exit 1
          fi
          grep -q '^brew "bun"' Brewfile
          grep -q '^brew "neovim"' Brewfile

      - name: Run complete setup
        shell: bash
        run: ./setup.sh --force | tee setup_log.txt

      - name: Verify tools, integrations, and symlinks
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v brew >/dev/null 2>&1 && [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          export PATH="$HOME/.local/bin:$PATH"

          for tool in nvim starship lazygit sheldon gh tmux zoxide fzf go uv bun pre-commit; do
            command -v "$tool"
          done

          data_home=${XDG_DATA_HOME:-$HOME/.local/share}
          test -x "$data_home/dotfiles-lsp/node_modules/.bin/typescript-language-server"
          test -x "$data_home/dotfiles-lsp/node_modules/.bin/pyright-langserver"
          test -x .git/hooks/pre-commit
          test -x .git/hooks/commit-msg

          for path in \
            "$HOME/.zshrc" \
            "$HOME/.tmux.conf" \
            "$HOME/.config/starship.toml" \
            "$HOME/.config/nvim" \
            "$HOME/.config/wezterm" \
            "$HOME/.config/sheldon" \
            "$HOME/.config/lazygit" \
            "$HOME/.config/gh"; do
            test -L "$path"
          done

      - name: Run functional smoke tests
        shell: bash
        run: |
          if ! command -v brew >/dev/null 2>&1 && [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          export PATH="$HOME/.local/bin:$PATH"
          ./scripts/smoke-test.sh

      - name: Run repository checks
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pre-commit run --all-files

      - name: Verify safe conflict behavior
        shell: bash
        run: |
          rm "$HOME/.zshrc"
          echo sentinel > "$HOME/.zshrc"
          ./setup.sh
          grep -q sentinel "$HOME/.zshrc"
          ./setup.sh --force
          test -L "$HOME/.zshrc"

      - name: Verify safe uninstallation
        shell: bash
        run: |
          if ! command -v brew >/dev/null 2>&1 && [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          ./uninstall.sh
          test ! -L "$HOME/.zshrc"
          test ! -L "$HOME/.config/nvim"
          brew list --formula neovim
          brew list --formula bun
