name: Validate Setup Scripts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x ./setup.sh ./uninstall.sh

      - name: Run setup script
        run: |
          ./setup.sh | tee setup_log.txt
          echo "Listing .config to see if everything is there:"
          ls -laR .config

      - name: Verify installation and symlinks
        run: |
          set -e
          echo "Verifying tools are in PATH..."
          command -v nvim
          command -v starship
          command -v lazygit
          command -v sheldon
          command -v gh
          command -v tmux
          command -v zoxide
          command -v fzf
          command -v go
          command -v uv

          echo "Verifying symlinks..."
          verify_link() {
            if [ -L "$1" ]; then
              echo "✓ Link exists: $1 -> $(readlink "$1")"
            else
              echo "✗ Link missing: $1"
              if grep -q "Skipping.*$(basename "$1")" setup_log.txt; then
                echo "  (Setup script skipped this link. Check the source directory exists in repo.)"
              fi
              return 1
            fi
          }

          verify_link "$HOME/.zshrc"
          verify_link "$HOME/.tmux.conf"
          verify_link "$HOME/.config/starship.toml"
          verify_link "$HOME/.config/nvim"
          verify_link "$HOME/.config/wezterm"
          verify_link "$HOME/.config/sheldon"
          verify_link "$HOME/.config/lazygit"
          verify_link "$HOME/.config/gh"

          echo "Setup verification successful!"
      - name: Run uninstall script
        run: echo "y" | ./uninstall.sh

      - name: Verify uninstallation and cleanup
        run: |
          set -e
          echo "Verifying symlinks are removed..."
          ! test -L "$HOME/.zshrc"
          ! test -L "$HOME/.config/nvim"

          # Note: We don't strictly check for tool removal of all packages 
          # because some might be pre-installed in GitHub Runner images (like git, curl, etc.)

          echo "Uninstallation verification successful!"