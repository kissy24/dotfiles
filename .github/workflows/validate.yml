name: Validate Setup Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Validate declarations and shell syntax
        shell: bash
        run: |
          bash -n setup.sh uninstall.sh .local/bin/pkgupd scripts/install-nix.sh \
            scripts/test-pkgupd.sh scripts/test-wezterm-herdr-fallback.sh
          ./setup.sh --help
          ./uninstall.sh --help
          test -f flake.nix
          if [ ! -f flake.lock ]; then
            echo "flake.lock will be generated by the locked-flake validation step."
          fi
          test ! -e Brewfile
          test ! -e packages/apt.txt
          grep -q 'nixpkgs-unstable' flake.nix
          grep -q 'herdr.packages' flake.nix
          grep -q 'nix-profile' .zshrc
          for path in \
            .config/herdr/herdr-client.log \
            .config/herdr/herdr-server.log \
            .config/herdr/session.json; do
            git check-ignore --no-index --quiet "$path"
          done
          if git check-ignore --no-index --quiet .config/herdr/config.toml; then
            echo "Managed Herdr config must not be ignored." >&2
            exit 1
          fi
          grep -Eq '^config\.enable_tab_bar[[:space:]]*=[[:space:]]*false$' .config/wezterm/wezterm.lua
          grep -Eq '^    config\.window_decorations = "TITLE \| RESIZE"$' .config/wezterm/wezterm.lua
          grep -Eq '^    config\.window_decorations = "RESIZE"$' .config/wezterm/wezterm.lua
          grep -Fq "then herdr && exit;" .config/wezterm/wezterm.lua
          grep -Fq "hrrでセッションを再起動できます" .config/wezterm/wezterm.lua
          grep -Fq "fi; exec zsh -l" .config/wezterm/wezterm.lua
          grep -q 'send_herdr_prefix_key' .config/wezterm/wezterm.lua
          grep -Eq 'key = "T".*mods = "CMD\|SHIFT".*send_herdr_prefix_key\("n", "SHIFT"\)' .config/wezterm/wezterm.lua
          grep -Eq 'key = "N".*mods = "CTRL\|SHIFT".*send_herdr_prefix_key\("n", "SHIFT"\)' .config/wezterm/wezterm.lua
          if command -v zsh >/dev/null 2>&1; then
            zsh -n .zshrc
          fi
          grep -q '^hrr() {' .zshrc
          grep -Fq "herdr session stop \"\$session_name\"" .zshrc
          grep -q '^hrw() {' .zshrc
          if grep -Eq 'format-tab-title|show_new_tab_button_in_tab_bar' .config/wezterm/wezterm.lua; then
            echo "WezTerm native tab UI must stay disabled in favor of Herdr tabs." >&2
            exit 1
          fi
          grep -Eq '^prompt_new_tab_name[[:space:]]*=[[:space:]]*false$' .config/herdr/config.toml
          grep -Eq '^hide_tab_bar_when_single_tab[[:space:]]*=[[:space:]]*false$' .config/herdr/config.toml
          if grep -R -q 'nvim-treesitter/nvim-treesitter' .config/nvim packages; then
            echo "Archived nvim-treesitter dependency is not allowed; use Neovim built-in parsers." >&2
            exit 1
          fi

      - name: Run complete setup
        shell: bash
        run: |
          ./scripts/install-nix.sh
          if [ -r /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh ]; then
            . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          else
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          fi
          nix --extra-experimental-features "nix-command flakes" flake lock
          ln -s "$PWD/.tmux.conf" "$HOME/.tmux.conf"
          ./setup.sh --force | tee setup_log.txt
          test ! -L "$HOME/.tmux.conf"

      - name: Verify tools, integrations, and symlinks
        shell: bash
        run: |
          set -euo pipefail
          if [ -r /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh ]; then
            . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          elif [ -r "$HOME/.nix-profile/etc/profile.d/nix.sh" ]; then
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          fi
          profile=${XDG_STATE_HOME:-$HOME/.local/state}/dotfiles/nix-profile
          export PATH="$profile/bin:$HOME/.local/bin:$PATH"

          for tool in zsh nvim starship lazygit sheldon gh herdr zoxide fzf go uv bun pre-commit; do
            command -v "$tool"
          done

          nix --extra-experimental-features "nix-command flakes" profile list --profile "$profile"
          data_home=${XDG_DATA_HOME:-$HOME/.local/share}
          test -x "$data_home/dotfiles-lsp/node_modules/.bin/typescript-language-server"
          test -x "$data_home/dotfiles-lsp/node_modules/.bin/pyright-langserver"
          test -x .git/hooks/pre-commit
          test -x .git/hooks/commit-msg

          for path in \
            "$HOME/.zshrc" \
            "$HOME/.local/bin/pkgupd" \
            "$HOME/.config/herdr/config.toml" \
            "$HOME/.config/starship.toml" \
            "$HOME/.config/nvim" \
            "$HOME/.config/wezterm" \
            "$HOME/.config/sheldon" \
            "$HOME/.config/lazygit" \
            "$HOME/.config/gh"; do
            test -L "$path"
          done

      - name: Run functional smoke tests
        shell: bash
        run: |
          if [ -r /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh ]; then
            . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          else
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          fi
          profile=${XDG_STATE_HOME:-$HOME/.local/state}/dotfiles/nix-profile
          export PATH="$profile/bin:$HOME/.local/bin:$PATH"
          ./scripts/smoke-test.sh

      - name: Validate locked Nix flake
        shell: bash
        run: |
          if [ -r /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh ]; then
            . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          else
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          fi
          nix --extra-experimental-features "nix-command flakes" flake lock
          if ! git diff --exit-code -- flake.lock; then
            echo "FLAKE_LOCK_BASE64_BEGIN"
            base64 < flake.lock
            echo "FLAKE_LOCK_BASE64_END"
            exit 1
          fi
          nix --extra-experimental-features "nix-command flakes" flake check

      - name: Run repository checks
        shell: bash
        run: |
          profile=${XDG_STATE_HOME:-$HOME/.local/state}/dotfiles/nix-profile
          export PATH="$profile/bin:$HOME/.local/bin:$PATH"
          pre-commit run --all-files
          if [ "$RUNNER_OS" = "Linux" ]; then
            pre-commit run betterleaks-working-tree --hook-stage manual --all-files
          fi

      - name: Verify safe conflict behavior
        shell: bash
        run: |
          rm "$HOME/.zshrc"
          echo sentinel > "$HOME/.zshrc"
          ./setup.sh
          grep -q sentinel "$HOME/.zshrc"
          ./setup.sh --force
          test -L "$HOME/.zshrc"

      - name: Verify safe uninstallation
        shell: bash
        run: |
          profile=${XDG_STATE_HOME:-$HOME/.local/state}/dotfiles/nix-profile
          export PATH="$profile/bin:$HOME/.local/bin:$PATH"
          ./uninstall.sh
          test ! -L "$HOME/.zshrc"
          test ! -L "$HOME/.local/bin/pkgupd"
          test ! -L "$HOME/.config/nvim"
          test -x "$profile/bin/nvim"
          test -x "$profile/bin/bun"
          printf 'y\n' | ./uninstall.sh --packages
          test ! -e "$profile/bin/nvim"
          test ! -e "$profile/bin/bun"
