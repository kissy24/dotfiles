name: Check Dependency Health

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - Brewfile
      - .config/nvim/**
      - .config/sheldon/**
      - .github/workflows/**
      - .pre-commit-config.yaml
      - packages/bun-lsp/bun.lock
      - scripts/check-dependency-eol.sh
      - scripts/check-dependency-cooldown.sh

permissions:
  contents: read

jobs:
  dependency-eol:
    name: Check dependency lifecycle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Reject archived, disabled, or deprecated dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/check-dependency-eol.sh

  dependency-cooldown:
    name: Check dependency cooldown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Reject dependencies released within the last 7 days
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/check-dependency-cooldown.sh
